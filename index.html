<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->
		<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
		<link rel="stylesheet" href="./styles.css" />
		<title>Frontend Mentor | Social links profile</title>
	</head>
	<main>
		<body>
			<div class="profile-card">
				<img src="./assets/images/avatar-jessica.jpeg" alt="profile-avatar" class="profile-img" />
				<div class="profile-heading">
					<h2 class="profile-name">Jessica Randall</h2>
					<p class="location">London, United Kingdom</p>
				</div>
				<div class="profile-quote">"Front-end developer and avid reader."</div>
				<div class="social-links">
					<button class="social-link-bttn">GitHub</button><button class="social-link-bttn">Frontend Mentor</button
					><button class="social-link-bttn">LinkedIn</button><button class="social-link-bttn">Twitter</button
					><button class="social-link-bttn">Instagram</button>
				</div>
			</div>

			<div class="attribution">
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by
				<a href="#">Your Name Here</a>.
			</div>
		</body>
	</main>
</html>
